name: Analytics Observability

on:
  workflow_run:
    workflows:
      - Deploy Production
    types:
      - completed
  schedule:
    - cron: "27 5 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: analytics-observability
  cancel-in-progress: true

env:
  NODE_VERSION: "22.18.0"
  NEXT_PUBLIC_ANALYTICS_ENABLED: "true"
  NEXT_PUBLIC_CLARITY_ID: ${{ vars.NEXT_PUBLIC_CLARITY_ID }}
  NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
  NEXT_PUBLIC_GTM_ID: ${{ vars.NEXT_PUBLIC_GTM_ID }}
  GOOGLE_ANALYTICS_ACCOUNT_ID: ${{ vars.GOOGLE_ANALYTICS_ACCOUNT_ID }}
  GOOGLE_ANALYTICS_PROPERTY_ID: ${{ vars.GOOGLE_ANALYTICS_PROPERTY_ID }}
  GOOGLE_ANALYTICS_WEB_STREAM_ID: ${{ vars.GOOGLE_ANALYTICS_WEB_STREAM_ID }}
  GOOGLE_GTM_ACCOUNT_ID: ${{ vars.GOOGLE_GTM_ACCOUNT_ID }}
  GOOGLE_GTM_CONTAINER_ID: ${{ vars.GOOGLE_GTM_CONTAINER_ID }}
  GOOGLE_GTM_WORKSPACE_ID: ${{ vars.GOOGLE_GTM_WORKSPACE_ID }}
  GOOGLE_SEARCH_CONSOLE_SITE: ${{ vars.GOOGLE_SEARCH_CONSOLE_SITE }}
  GOOGLE_SITEMAP_URL: ${{ vars.GOOGLE_SITEMAP_URL }}
  CLARITY_PROJECT_ID: ${{ vars.CLARITY_PROJECT_ID }}
  GOOGLE_AUTH_MODE: ${{ secrets.GOOGLE_AUTH_MODE || 'auto' }}
  GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
  GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
  GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
  GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
  CLARITY_EXPORT_TOKEN: ${{ secrets.CLARITY_EXPORT_TOKEN }}

jobs:
  audit:
    name: ops/analytics-observability
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout audited revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Record canonical configuration status
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/analytics
          npm run --silent ops:status > .artifacts/analytics/ops-status.json
          npm run --silent ops:clarity -- status > .artifacts/analytics/clarity-status.json

      - name: Verify Google administrative resources
        run: npm run ops:analytics-admin-audit -- --output-dir .artifacts/analytics

      - name: Audit consent, tag loading, and form events in every locale
        env:
          ANALYTICS_AUDIT_BASE_URL: https://sismosmart.com
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: >-
          npm run ops:analytics-audit --
          --output .artifacts/analytics/browser-audit.json

      - name: Upload analytics observability report
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: analytics-observability-${{ github.run_id }}
          path: .artifacts/analytics
          if-no-files-found: error
          retention-days: 14
