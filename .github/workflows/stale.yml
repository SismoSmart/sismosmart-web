name: Mark stale issues and pull requests

on:
  schedule:
    - cron: "31 18 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale items
        uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899  # v10.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 30
          days-before-close: 7
          stale-pr-message: >
            This pull request has been marked stale due to inactivity. It will be
            closed if no further activity occurs.
          stale-issue-message: >
            This issue has been marked stale due to inactivity. It will be closed
            if no further activity occurs.
          stale-issue-label: no-issue-activity
          stale-pr-label: no-pr-activity
