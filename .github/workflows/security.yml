name: Security

on:
  push:
    branches:
      - main
      - develop
      - "chore/**"
      - "oaslananka/**"
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  audit:
    name: security/npm-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22.18.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  gitleaks:
    name: security/gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            zricethezav/gitleaks:v8.28.0 \
            detect --source /repo --redact --verbose

  codeql:
    name: security/codeql
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Explain CodeQL availability
        if: ${{ github.event.repository.private && vars.ENABLE_CODEQL != 'true' }}
        run: |
          echo "::notice title=CodeQL unavailable::GitHub Advanced Security is not enabled for this private repository. Set repository variable ENABLE_CODEQL=true only after code scanning is enabled."

      - name: Checkout repository
        if: ${{ github.event.repository.private == false || vars.ENABLE_CODEQL == 'true' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Initialize CodeQL
        if: ${{ github.event.repository.private == false || vars.ENABLE_CODEQL == 'true' }}
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        if: ${{ github.event.repository.private == false || vars.ENABLE_CODEQL == 'true' }}
        uses: github/codeql-action/autobuild@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4

      - name: Analyze
        if: ${{ github.event.repository.private == false || vars.ENABLE_CODEQL == 'true' }}
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4
