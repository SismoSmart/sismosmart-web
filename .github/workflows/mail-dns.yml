name: Mail DNS Audit

on:
  schedule:
    - cron: "47 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mail-dns-audit
  cancel-in-progress: true

env:
  NODE_VERSION: "22.18.0"
  DNS_ORIGIN_IPV4: ${{ secrets.DNS_ORIGIN_IPV4 }}

jobs:
  audit:
    name: ops/mail-dns
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit MX, SPF, DKIM, DMARC, and SMTP TLS
        run: npm run ops:mail-dns -- --output .artifacts/mail-dns-report.json

      - name: Upload mail DNS report
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: mail-dns-${{ github.run_id }}
          path: .artifacts/mail-dns-report.json
          if-no-files-found: error
          retention-days: 14
