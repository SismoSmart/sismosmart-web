name: Lighthouse

on:
  workflow_run:
    workflows:
      - Deploy Production
    types:
      - completed
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: quality/lighthouse
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Warm production pages
        shell: bash
        run: |
          urls=(
            "https://sismosmart.com/en"
            "https://sismosmart.com/en/product"
            "https://sismosmart.com/tr/product"
          )

          for _ in 1 2 3; do
            for url in "${urls[@]}"; do
              curl --compressed -fsSL --max-time 30 "$url" >/dev/null
            done
            sleep 3
          done

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18  # 12.6.2
        with:
          urls: |
            https://sismosmart.com/en
            https://sismosmart.com/en/product
            https://sismosmart.com/tr/product
          configPath: .lighthouserc.json
          uploadArtifacts: false
          temporaryPublicStorage: true
