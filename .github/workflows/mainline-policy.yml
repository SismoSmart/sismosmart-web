name: Mainline Policy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: "22.18.0"

jobs:
  verify-pr-origin:
    name: governance/pr-origin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Node.js
        if: ${{ github.event_name == 'push' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify main commit came through a merged pull request
        if: ${{ github.event_name == 'push' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/ci/verify-mainline-pr-origin.mjs

      - name: Explain manual invocation
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: echo "Mainline policy is enforced automatically on pushes to main."
