# GitHub labeler configuration: automatically add labels to PRs based on changed paths.
# Update labels in the repository settings as needed.

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "docs/**"
          - ".github/**"

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**/*.tsx"
          - "src/**/*.ts"
          - "src/**/*.css"

backend:
  - changed-files:
      - any-glob-to-any-file: "scripts/**"

chore:
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "package-lock.json"
          - "tsconfig.json"
          - "eslint.config.mjs"
          - "postcss.config.mjs"
